name: CI

on:
  push:
    branches: [main]
  pull_request:

# The full app needs Xcode's Metal toolchain and the native SPICE sysroot, neither
# of which CI fetches. These jobs cover what builds and tests with only the Swift
# toolchain: .vv parsing, keyboard input routing, clipboard gating, and cursor
# presentation/lifecycle policy (55 checks).
# The CocoaSpice fork patch and the focused stutter/latency XCTest targets are
# release-gated locally with `make test-stutter`, `make test-latency`, and
# `make build`. They need the staged native frameworks plus Xcode's Metal modules,
# so they cannot run in this dependency-free job.

jobs:
  swift-tests:
    name: Pure-Swift checks
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Show toolchain
        run: swift --version

      - name: VVConfig — .vv parser checks
        working-directory: Packages/VVConfig
        run: swift run vvcheck

      - name: SpiceInputMap — keycode/scancode and synthetic-routing checks
        working-directory: Packages/SpiceInputMap
        run: swift run inputcheck

      - name: SpiceClipboardLogic — sharing-gate checks
        working-directory: Packages/SpiceClipboardLogic
        run: swift test

      - name: SpiceCursorLogic — presentation and lifecycle checks
        working-directory: Packages/SpiceCursorLogic
        run: swift test

      - name: Version consistency (Info.plist / CHANGELOG / links)
        run: ./scripts/check-version.sh

  shell-lint:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck scripts
        run: shellcheck --severity=warning -x scripts/*.sh
